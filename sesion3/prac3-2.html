<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<title>CGSM - Práctica 3.2 (Textura de vídeo)</title>
	<style>
		body {
			margin: 0;
			overflow: hidden;
			background: #111;
		}

		#overlay > div > button {
			padding: 8px 16px;
			height: auto;
			font-size: 14px;
		}
	</style>
</head>
<body>
	<div id="overlay">
		<div>
			<button id="startButton">Iniciar escena</button>
			<p>La reproducción de vídeo requiere interacción previa del usuario.</p>
		</div>
	</div>

	<video id="video" style="display:none" autoplay="true" loop playsinline crossorigin="anonymous">
		<source src="videos/sintel.mp4" type="video/mp4">
		<source src="videos/sintel.ogv" type="video/ogg">
	</video>

	<script src="dist/prac3-2.js"></script>
</body>
</html>
